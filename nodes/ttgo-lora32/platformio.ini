; ── Shared base ───────────────────────────────────────────────────────────────
[env]
platform      = espressif32
board         = ttgo-lora32-v1
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0

build_flags =
    ; MQTT packet buffer — default 256 is too small for 20-entry JSON payloads
    -D MQTT_MAX_PACKET_SIZE=4096
    ; No ARDUINO_USB_CDC_ON_BOOT — this board uses a CH340 USB-serial chip

; ── Headless (no display) ─────────────────────────────────────────────────────
[env:ttgo-lora32-headless]
; BLE + WiFi stack exceeds the default 1MB app partition — use huge_app (3MB app).
board_build.partitions = huge_app.csv

; ── With OLED display (SSD1306, 128×64, I2C) ──────────────────────────────────
[env:ttgo-lora32-oled]
board_build.partitions = huge_app.csv

lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

build_flags =
    ${env.build_flags}
    -D HAS_OLED=1
    -D OLED_SDA=21
    -D OLED_SCL=22
    -D OLED_RST=16
