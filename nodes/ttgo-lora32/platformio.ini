; ── Shared base ───────────────────────────────────────────────────────────────
[env]
platform      = espressif32
board         = ttgo-t-beam
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    mikalhart/TinyGPSPlus @ ^1.0.3
    lewisxhe/AXP202X_Library @ ^1.1.3

build_unflags =
    ; T-Beam board JSON adds PSRAM flags but this V1.1 has no PSRAM.
    ; Leaving BOARD_HAS_PSRAM set causes psramInit() to run unconditionally
    ; (via CONFIG_SPIRAM=y in sdkconfig), corrupting the heap allocator and
    ; crashing the UART TX semaphore when WiFi allocates large buffers.
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

build_flags =
    ; MQTT packet buffer — default 256 is too small for 20-entry JSON payloads
    -D MQTT_MAX_PACKET_SIZE=4096
    ; No ARDUINO_USB_CDC_ON_BOOT — T-Beam V1.1 uses a CP2102 USB-serial chip
    ; T-Beam V1.1 GPS (u-blox NEO-M8N) on Serial1
    -D GPS_RX_PIN=34
    -D GPS_TX_PIN=12
    ; Shared I2C bus — AXP192 PMIC (0x34) and OLED SSD1306 (0x3C) both on Wire
    -D I2C_SDA=21
    -D I2C_SCL=22

; ── Headless (no display) ─────────────────────────────────────────────────────
[env:ttgo-lora32-headless]
; BLE + WiFi stack exceeds the default 1MB app partition — use huge_app (3MB app).
board_build.partitions = huge_app.csv

; ── With OLED display (SSD1306, 128×64, I2C) ──────────────────────────────────
[env:ttgo-lora32-oled]
board_build.partitions = huge_app.csv

lib_deps =
    ${env.lib_deps}
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

build_flags =
    ${env.build_flags}
    -D HAS_OLED=1
    -D DISP_RST=16
